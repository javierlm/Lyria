<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lyria</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #101523;
        color: #f9fafb;
        font-family: Inter, system-ui, sans-serif;
      }

      .boot-screen {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(248, 113, 113, 0.15), transparent 45%), #101523;
      }

      .boot-card {
        width: min(76vw, 720px);
        padding: 2rem 2.2rem;
        border-radius: 28px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(31, 41, 55, 0.92);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: 2rem;
        letter-spacing: -0.03em;
      }

      p {
        margin: 0;
        line-height: 1.5;
        color: rgba(249, 250, 251, 0.82);
      }

      .meta {
        margin-top: 1.25rem;
        font-size: 0.9rem;
        color: rgba(249, 250, 251, 0.56);
      }
    </style>
  </head>
  <body>
    <div class="boot-screen">
      <div class="boot-card">
        <h1>Lyria</h1>
        <p>Opening the remote Lyria frontend for Tizen sideloading.</p>
        <p class="meta">https://lyria-halonkira-23lpdarkshadow-3392s-projects.vercel.app</p>
      </div>
    </div>
    <script>
      const remoteAppUrl = 'https://lyria-halonkira-23lpdarkshadow-3392s-projects.vercel.app';
      globalThis.location.replace(remoteAppUrl);
    </script>
  </body>
</html>
