services:
  db-tests:
    build:
      context: .
      dockerfile: docker/Dockerfile.db-service
      target: db-tests
    environment:
      DATABASE_MODE: auto
      DATABASE_LOCAL_URL: http://127.0.0.1:8091
      TEST_DB_PORT: 8091
      TEST_DB_FILE: /tmp/lyria-test.db
      TEST_REQUIRE_FUZZY: 1
      TEST_DB_RUNTIME: sqld
      SQLD_EXTENSIONS_PATH: /opt/sqlean
      TEST_DB_FUZZY_EXTENSION: fuzzy.so
